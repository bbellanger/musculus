services:
  web:
    build: .
    restart: always
    env_file: .env
    volumes:
      - db_data:/app/db_data
      - ./staticfiles:/app/staticfiles
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
    depends_on:
      - web

volumes:
    db_data:
